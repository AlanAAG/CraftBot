      - link "一般ビジネス日本語20回コース 1回50分/全20回 日本のビジネスシーンにおいて欠かせない基礎的なマナーや敬語表現、社内外の連絡のしかたなどを包括的に学ぶコースです。円滑なコミュニケーションを図るために必要な日本的なマナーと、メールや電話などで用いる実用的な日本語表現をバランスよく身につけることを目指しています。また、日本語ブラッシュアップでは発音、文法などを復習、練習し、日本語の基礎力をあげるとともに、ミニスピーチでは分かりやすく話す方法も学びます。" [ref=e148] [cursor=pointer]:
