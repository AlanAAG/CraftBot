      - link "一般ビジネス日本語10回コース 1回50分/全10回 日本のビジネスシーンにおいて、よく求められるコミュニケーションを包括的に学ぶコースです。自己紹介、ビジネス電話応対、ビジネス敬語、ビジネスメール、ビジネスマナーに関する基礎的な日本語の表現を学習します。また、ミニ・スピーチに取り組み、簡潔に分かりやすく伝える方法を学習します。" [ref=e155] [cursor=pointer]:
