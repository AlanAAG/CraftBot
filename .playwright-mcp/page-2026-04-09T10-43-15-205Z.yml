      - link "ビジネス日本語中級Ⅰコース 1回50分/全20回 本コースは「日本語初級Ⅱコース」の次のレベルのコースです。同僚や上司との職場での日常的なやり取りや、ビジネス会話の基礎的な表現などを学びます。初級レベルの知識を復習しながら、中級前半の文型、語彙、表現を積み重ねていきますので、少し込み入った話題について話したり、やり取りが多くなる場面でも日本語で問題解決できるようになります。" [ref=e134] [cursor=pointer]:
