      - link "ビジネス日本語中級Ⅱコース 1回50分/全20回 本コースは中級前半レベルの会話力を身に付けた方が、状況や相手に合わせた敬語や表現を使いながら、少し高度なコミュニケーションが取れるようになることを目標にしています。日本語で円滑な業務が行えるように会社の同僚との日常的なやりとりの他、社内・社外の人とのビジネス場面でのやりとりなどの日本語を学びます。" [ref=e141] [cursor=pointer]:
